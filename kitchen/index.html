<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Schad K&uuml;che">
<meta name="theme-color" content="#0d141e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="../assets/kitchen-icon-180.png">
<link rel="icon" type="image/png" href="../assets/kitchen-icon-192.png">
<title>PIZZA SCHAD - K&uuml;che</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f16;--bg-card:#111920;--border:#1e2d3d;--text:#e8edf2;
  --text-secondary:#7a8fa0;--text-muted:#4a5a6a;
  --status-new:#e74c3c;--status-preparing:#f39c12;--status-ready:#2ecc71;
  --accent:#3498db;--radius:14px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.topbar{background:#0d141e;border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar h1{font-size:24px;font-weight:800;color:var(--status-ready);letter-spacing:-1px}
.topbar h1 span{color:var(--text-secondary);font-weight:400;font-size:14px;margin-left:8px}
.topbar-time{font-size:32px;font-weight:300;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:2px}
.topbar-right{display:flex;align-items:center;gap:16px}
.stats{display:flex;gap:12px}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 18px;text-align:center}
.stat-val{font-size:28px;font-weight:700;line-height:1}
.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.stat.new .stat-val{color:var(--status-new)}
.stat.preparing .stat-val{color:var(--status-preparing)}
.stat.ready .stat-val{color:var(--status-ready)}
.sound-toggle,.time-filter{background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:13px;transition:all .15s;white-space:nowrap}
.sound-toggle:hover,.time-filter:hover{background:var(--border)}
.sound-toggle.muted{color:var(--status-new);border-color:var(--status-new)}
.time-filter.active{border-color:var(--status-preparing);color:var(--status-preparing);font-weight:700}
.orders-grid{column-width:360px;column-gap:16px;padding:20px 28px}
.order-card{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .3s;break-inside:avoid;-webkit-column-break-inside:avoid;page-break-inside:avoid;margin-bottom:16px}
.order-card.status-NEW{border-color:var(--status-new)}
.order-card.status-PREPARING{border-color:var(--status-preparing)}
.order-card.status-READY{border-color:var(--status-ready);opacity:.85}
.order-card.has-deadline{border-top:4px solid var(--accent)}
.card-header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2)}
.order-number{font-size:24px;font-weight:800;letter-spacing:-.5px}
.order-time{font-size:13px;color:var(--text-secondary);margin-top:2px}
.status-badge{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.status-NEW .status-badge{background:var(--status-new);color:#fff}
.status-PREPARING .status-badge{background:var(--status-preparing);color:#000}
.status-READY .status-badge{background:var(--status-ready);color:#000}
.deadline-banner{text-align:center;padding:10px 18px;font-size:15px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:8px}
.deadline-banner.ok{background:rgba(46,204,113,.1);color:var(--status-ready)}
.deadline-banner.near{background:rgba(231,76,60,.12);color:var(--status-new);animation:dlPulse .7s ease infinite}
.deadline-banner.due{background:var(--status-new);color:#fff;animation:dlPulse .35s ease infinite}
@keyframes dlPulse{0%,100%{opacity:1}50%{opacity:.6}}
.card-body{padding:18px 22px}
.order-items-list{list-style:none}
.order-items-list li{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:flex-start;gap:12px}
.order-items-list li:last-child{border-bottom:none}
.order-items-list li.combo-header{display:block;padding:9px 12px;margin:6px 0 2px;background:rgba(243,156,18,.14);border:1px solid var(--status-preparing);border-radius:8px;color:var(--status-preparing);font-size:15px;font-weight:800;letter-spacing:.3px}
.order-items-list li.combo-item{border-left:3px solid rgba(243,156,18,.4);padding-left:12px;background:rgba(243,156,18,.04)}
.item-qty{background:var(--accent);color:#fff;min-width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:4px}
.item-product-num{color:var(--text-muted);font-size:12px;font-weight:400}
.item-base{font-size:15px;color:#cdd9e3;font-weight:500;line-height:1.45;margin-top:3px;display:flex;gap:6px;align-items:flex-start}
.item-base .ib-icon{flex-shrink:0;opacity:.8}
.item-size{font-size:14px;color:var(--accent);font-weight:600;margin-top:4px}
.item-modifiers{font-size:13px;color:var(--text-secondary);margin-top:6px;line-height:1.6}
.mod-group{margin-top:4px;display:flex;flex-wrap:wrap;align-items:center;gap:4px}
.mod-label{font-weight:700;font-size:12px;color:var(--text);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.mod-group.g-belag .mod-label{color:var(--status-ready)}
.mod-group.g-extra .mod-label{color:var(--status-new)}
.mod-group.g-special .mod-label{color:var(--status-preparing)}
.item-modifiers span.mod-val{display:inline-block;background:rgba(255,255,255,.1);padding:3px 9px;border-radius:6px;font-weight:600;color:var(--text)}
.mod-group.g-belag span.mod-val{background:rgba(46,204,113,.16);color:#7fe6a8}
.mod-group.g-extra span.mod-val{background:rgba(231,76,60,.18);color:#f5998f}
.mod-group.g-special span.mod-val{background:rgba(243,156,18,.16);color:#f3c074}
.item-notes{font-size:13px;color:var(--status-preparing);font-weight:600;margin-top:4px;font-style:italic}
.card-timer{text-align:center;padding:12px;font-size:30px;font-weight:700;color:var(--text);border-top:1px solid var(--border);font-variant-numeric:tabular-nums;transition:color .3s;background:rgba(0,0,0,.15)}
.card-timer.age-warn{color:var(--status-preparing)}
.card-timer.age-hot{color:#e67e22}
.card-timer.age-crit{color:var(--status-new);animation:dlPulse 1s ease infinite}
.card-actions{padding:12px 22px 16px;display:flex;gap:10px}
.card-actions button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.btn-preparing{background:rgba(243,156,18,.15);color:var(--status-preparing);border:1px solid var(--status-preparing)}
.btn-preparing:hover{background:var(--status-preparing);color:#000}
.btn-ready{background:rgba(46,204,113,.15);color:var(--status-ready);border:1px solid var(--status-ready)}
.btn-ready:hover{background:var(--status-ready);color:#000}
.btn-new{background:rgba(231,76,60,.15);color:var(--status-new);border:1px solid var(--status-new)}
.btn-new:hover{background:var(--status-new);color:#fff}
.empty-state{column-span:all;text-align:center;padding:80px 20px}
.empty-state .icon{font-size:72px;margin-bottom:16px;opacity:.3}
.empty-state h2{font-size:24px;color:var(--text-secondary);margin-bottom:8px}
.empty-state p{color:var(--text-muted);font-size:14px}
.timestamp{font-size:10px;color:var(--text-muted);text-align:right;padding:4px 22px 8px}
.station-nav{display:flex;gap:8px;flex-wrap:wrap}
.station-nav a{text-decoration:none;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);padding:8px 13px;border-radius:10px;font-size:13px;font-weight:700;transition:all .15s;white-space:nowrap}
.station-nav a:hover{background:var(--border);color:var(--text)}
.station-nav a.active{border-color:var(--status-ready);color:var(--status-ready);background:rgba(46,204,113,.08)}
.station-progress{display:flex;gap:8px;flex-wrap:wrap;padding:10px 22px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.12)}
.sp-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text-secondary)}
.sp-chip.done{border-color:var(--status-ready);color:var(--status-ready);background:rgba(46,204,113,.12)}
.sp-chip.pending{border-color:var(--status-preparing);color:var(--status-preparing);background:rgba(243,156,18,.1)}
.ready-ribbon{padding:10px 22px;font-size:14px;font-weight:800;letter-spacing:.3px;color:#04210f;background:linear-gradient(90deg,#2ecc71,#27ae60);border-bottom:1px solid var(--border);text-align:center}
.insgesamt{margin:16px 28px 0;background:linear-gradient(135deg,#1a1208,#15110a);border:1px solid #4a3a1e;border-left:5px solid var(--status-preparing);border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 4px 16px rgba(0,0,0,.35)}
.insgesamt .ins-title{display:flex;flex-direction:column;gap:2px;padding-right:18px;border-right:1px solid #4a3a1e}
.insgesamt .ins-title b{font-size:18px;font-weight:800;color:var(--status-preparing);letter-spacing:.3px}
.insgesamt .ins-title small{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px}
.insgesamt .ins-sizes{display:flex;gap:12px;flex-wrap:wrap;flex:1}
.ins-size{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:84px;padding:10px 16px;background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.4);border-radius:12px}
.ins-size .ins-count{font-size:30px;font-weight:800;line-height:1;color:#f3c074;font-variant-numeric:tabular-nums}
.ins-size .ins-label{font-size:13px;font-weight:700;color:var(--text);margin-top:4px}
.insgesamt .ins-total{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-left:18px;border-left:1px solid #4a3a1e}
.insgesamt .ins-total b{font-size:34px;font-weight:800;line-height:1;color:var(--text)}
.insgesamt .ins-total small{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
@media(max-width:768px){.insgesamt{margin:12px}}
.order-card.all-ready{border-color:var(--status-ready);box-shadow:0 0 0 2px rgba(46,204,113,.35),0 6px 22px rgba(46,204,113,.12)}
.card-address{padding:9px 22px;font-size:15px;font-weight:700;color:#7fc4ec;background:rgba(52,152,219,.1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
@media(max-width:768px){.orders-grid{column-width:auto;column-count:1;padding:12px}.topbar{padding:10px 16px}.topbar h1{font-size:18px}.topbar-time{font-size:24px}.stat-val{font-size:22px}}

/* ============ iPad / Touch-Optimierung ============ */
html{height:-webkit-fill-available}
body{min-height:100vh;min-height:-webkit-fill-available;-webkit-overflow-scrolling:touch}
*{-webkit-tap-highlight-color:transparent}
button,.sound-toggle,.time-filter,.card-actions button{touch-action:manipulation;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
.orders-grid{-webkit-overflow-scrolling:touch}
/* Safe-Area (Notch / Home-Indicator) */
.topbar{padding-top:max(14px,env(safe-area-inset-top));flex-wrap:wrap;gap:10px}
.topbar-right{flex-wrap:wrap;justify-content:flex-end}
.orders-grid{padding-bottom:max(20px,env(safe-area-inset-bottom));padding-left:max(28px,env(safe-area-inset-left));padding-right:max(28px,env(safe-area-inset-right))}
/* Größere Touch-Ziele */
.card-actions button{padding:15px 12px;font-size:15px}
.sound-toggle,.time-filter{padding:11px 16px;font-size:14px}
/* iPad Hochformat: 2 Spalten beibehalten, Topbar kompakt */
@media(min-width:769px) and (max-width:900px){
  .topbar h1 span{display:none}
  .topbar-time{font-size:26px}
  .orders-grid{column-width:330px}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <h1>PIZZA SCHAD<span> | K&uuml;chenanzeige</span></h1>
    <nav class="station-nav">
      <a href="index.html" class="active">Alle</a>
      <a href="pizza.html">🍕 Pizza</a>
      <a href="salat.html">🥗 Salat &amp; Burger</a>
      <a href="kochen.html">🍳 Küche</a>
    </nav>
  </div>
  <div class="topbar-right">
    <div class="stats">
      <div class="stat new"><div class="stat-val" id="countNew">0</div><div class="stat-label">Neu</div></div>
    </div>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊 Ton an</button>
    <span id="firebaseStatus" style="font-size:11px;padding:4px 10px;border-radius:8px;background:#e74c3c22;color:#e74c3c;border:1px solid #e74c3c44;white-space:nowrap" title="Firebase nicht verbunden">Offline</span>
    <div class="topbar-time" id="clock">00:00:00</div>
  </div>
</div>
<div class="insgesamt" id="insgesamt" style="display:none"></div>
<div class="orders-grid" id="ordersGrid">
  <div class="empty-state"><div class="icon">🍳</div><h2>Keine aktiven Bestellungen</h2><p>Neue Bestellungen erscheinen hier in Echtzeit</p></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
let knownOrderIds = new Set();
let soundEnabled = true;
let audioUnlocked = false;
let orders = {};
let timeFilter = null;
let deadlineAlertsFired = {};
let db = null;
let firebaseUnsubscribe = null;

const firebaseConfig = {
  apiKey: "AIzaSyDH-UQwNv4t0Xafz8-ARZjyr69k9VHVlDI",
  authDomain: "schad-62da7.firebaseapp.com",
  projectId: "schad-62da7",
  storageBucket: "schad-62da7.firebasestorage.app",
  messagingSenderId: "331626315267",
  appId: "1:331626315267:web:30bf0cc377186b32131836"
};
try {
  if (typeof firebase === 'undefined') throw new Error('Firebase SDK not loaded');
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  console.log('Firebase connected successfully');
  var statusEl = document.getElementById('firebaseStatus');
  if (statusEl) { statusEl.textContent = 'Online'; statusEl.style.background = '#2ecc7122'; statusEl.style.color = '#2ecc71'; statusEl.style.borderColor = '#2ecc7144'; statusEl.title = 'Firebase verbunden'; }
} catch(e) {
  console.error('Firebase init FAILED:', e.message || e);
  var statusEl = document.getElementById('firebaseStatus');
  if (statusEl) { statusEl.textContent = 'Offline'; statusEl.title = 'Firebase Fehler: ' + (e.message || e); }
  document.getElementById('ordersGrid').innerHTML = '<div class="empty-state"><div class="icon">❌</div><h2>Firebase nicht verbunden</h2><p>Bitte Seite neu laden (Ctrl+Shift+R)</p></div>';
}

// Menu lookup
let menuDesc = {};
let menuCat = {};
function loadMenu() {
  fetch('../firebase/menu-data.json')
    .then(function(r){ return r.json(); })
    .then(function(data){
      var prods = (data && data.products) || [];
      prods.forEach(function(p){
        var d = (p.description == null ? '' : String(p.description)).trim();
        if (p.id){ if (d) menuDesc['id:'+p.id] = d; if (p.category) menuCat['id:'+p.id] = p.category; }
        if (p.productNumber != null){ if (d) menuDesc['num:'+String(p.productNumber)] = d; if (p.category) menuCat['num:'+String(p.productNumber)] = p.category; }
      });
      renderAllOrders();
    })
    .catch(function(){});
}
function getItemIngredients(item) {
  if (!item) return '';
  if (item.productId && menuDesc['id:'+item.productId]) return menuDesc['id:'+item.productId];
  if (item.productNumber != null && menuDesc['num:'+String(item.productNumber)]) return menuDesc['num:'+String(item.productNumber)];
  return '';
}
function getItemCategory(item) {
  if (!item) return '';
  if (item.productId && menuCat['id:'+item.productId]) return menuCat['id:'+item.productId];
  if (item.productNumber != null && menuCat['num:'+String(item.productNumber)]) return menuCat['num:'+String(item.productNumber)];
  return '';
}

// ---- Stations-Zuordnung (identisch zu station.js) ----
var CAT_STATION = {
  pizza:'pizza', salate:'salat', burger:'salat', fingerfood:'salat', extras:'salat', getraenke:'salat',
  lasagne:'kochen', pasta:'kochen', gnocchi:'kochen', schnitzel:'kochen',
  mexikanisch:'kochen', enchiladas:'kochen', gegrilltes:'kochen',
  pakistanisch:'kochen'
};
var STATION_META = { pizza:{icon:'🍕',label:'Pizza'}, salat:{icon:'🥗',label:'Salat/Burger'}, kochen:{icon:'🍳',label:'Küche'} };
function nameStation(name){
  var n = String(name||'').toLowerCase();
  if (/pizza/.test(n)) return 'pizza';
  if (/salat|burger|pommes|cola|fanta|sprite|mezzo|eistee|wasser|sprudel|getr|saft|limo|tiramisu|apfelstrudel|nuggets|wings|onion|calamari|krokette|potato|cookie/.test(n)) return 'salat';
  return 'kochen';
}
function itemStation(item){
  if (!item) return null;
  if (item.combo && item.combo.isPizza) return 'pizza';
  var cat = getItemCategory(item);
  if (cat && Object.prototype.hasOwnProperty.call(CAT_STATION, cat)) return CAT_STATION[cat];
  return nameStation(item.name);
}
function stationsNeededList(order){
  var set = {};
  (order.items||[]).forEach(function(it){ var s = itemStation(it); if (s) set[s] = true; });
  return Object.keys(set);
}
function allStationsDone(order){
  var needed = stationsNeededList(order);
  if (needed.length === 0) return false;
  var done = order.stationsDone || [];
  return needed.every(function(s){ return done.indexOf(s) >= 0; });
}
function renderStationProgress(order){
  var needed = stationsNeededList(order);
  if (needed.length === 0) return '';
  var done = order.stationsDone || [];
  var ready = allStationsDone(order) ? '<div class="ready-ribbon">✅ كل المحطات خلّصت — جاهز للتقديم</div>' : '';
  if (needed.length <= 1) return ready;
  var order2 = ['pizza','salat','kochen'].filter(function(s){ return needed.indexOf(s) >= 0; });
  return '<div class="station-progress">' + order2.map(function(s){
    var m = STATION_META[s], isDone = done.indexOf(s) >= 0;
    return '<span class="sp-chip '+(isDone?'done':'pending')+'">'+m.icon+' '+m.label+' '+(isDone?'✓':'⏳')+'</span>';
  }).join('') + '</div>' + ready;
}

// ---- Insgesamt: Pizza-Teig nach Größe (ohne Sorte) für den Teig-Verantwortlichen ----
var PIZZA_SIZE_ORDER = ['klein','gross','xl','familie','party'];
var PIZZA_SIZE_LABEL = { klein:'Klein', gross:'Groß', xl:'XL', familie:'Familie', party:'Party' };
function itemSizeKey(item){
  var s = item && item.size;
  if (!s) return { key:'standard', label:'Standard' };
  var id = String(s.id||'').toLowerCase().trim();
  if (id && PIZZA_SIZE_LABEL[id]) return { key:id, label:PIZZA_SIZE_LABEL[id] };
  var name = String(s.name||'').trim(), lname = name.toLowerCase();
  if (PIZZA_SIZE_LABEL[lname]) return { key:lname, label:PIZZA_SIZE_LABEL[lname] };
  return { key:(id||lname||'standard'), label:(name||id||'Standard') };
}
function computePizzaTotals(list){
  var buckets = {}, total = 0;
  list.forEach(function(o){
    (o.items||[]).forEach(function(it){
      if (itemStation(it) !== 'pizza') return;
      var qty = it.quantity||1, sz = itemSizeKey(it);
      if (!buckets[sz.key]) buckets[sz.key] = { label:sz.label, count:0 };
      buckets[sz.key].count += qty;
      total += qty;
    });
  });
  return { buckets:buckets, total:total };
}
function renderInsgesamt(list){
  var el = document.getElementById('insgesamt');
  if (!el) return;
  var res = computePizzaTotals(list);
  if (res.total === 0){ el.style.display = 'none'; el.innerHTML = ''; return; }
  var keys = Object.keys(res.buckets).sort(function(a,b){
    var ia = PIZZA_SIZE_ORDER.indexOf(a), ib = PIZZA_SIZE_ORDER.indexOf(b);
    return (ia<0?99:ia) - (ib<0?99:ib);
  });
  var sizes = keys.map(function(k){
    var b = res.buckets[k];
    return '<div class="ins-size"><div class="ins-count">'+b.count+'</div><div class="ins-label">'+b.label+'</div></div>';
  }).join('');
  el.innerHTML = '<div class="ins-title"><b>🍕 Insgesamt</b><small>Teig · العجين</small></div>'
    + '<div class="ins-sizes">'+sizes+'</div>'
    + '<div class="ins-total"><b>'+res.total+'</b><small>Pizzen gesamt</small></div>';
  el.style.display = 'flex';

// Timer-Anker: Zeitpunkt, an dem DIESE Anzeige die Bestellung zuerst sah.
// So startet jede neue Bestellung bei 0 — unabhängig von einer falschen Geräteuhr.
var firstSeenMap = {};
function getEffectiveStart(order) {
  var now = Date.now();
  var fs = firstSeenMap[order.id] || now;
  var created = order.createdAt ? new Date(order.createdAt).getTime() : NaN;
  if (!isFinite(created)) return fs;
  if (created > now || (fs - created) > 120000) return fs; // Uhr unzuverlässig
  return created;
}
function getOrderAgeMinutes(order) {
  return Math.floor(Math.max(0, Date.now() - getEffectiveStart(order)) / 60000);
}

var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playAlertSound(repeat) {
  if(!soundEnabled || !audioUnlocked) return;
  try{
    var ctx = getAudioCtx();
    if(ctx.state==='suspended') ctx.resume();
    var reps = repeat || 3;
    for(var r=0; r<reps; r++){
      var offset = r * 1.2;
      var st = ctx.currentTime + offset;
      for(var i=0;i<3;i++){
        var t=st+i*.15;
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=1000;o.type='square';
        g.gain.setValueAtTime(.7,t);g.gain.linearRampToValueAtTime(.001,t+.12);
        o.start(t);o.stop(t+.13);
      }
    }
  }catch(e){}
}

function playNotificationSound() {
  if(!soundEnabled || !audioUnlocked) return;
  try{
    var ctx = getAudioCtx();
    if(ctx.state==='suspended') ctx.resume();
    var D=4,BL=.15,G=.1,st=ctx.currentTime;
    for(var i=0;i<D/(BL+G);i++){
      var t=st+i*(BL+G);
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=i%2===0?880:660;o.type='square';
      g.gain.setValueAtTime(.6,t);g.gain.linearRampToValueAtTime(.001,t+BL);
      o.start(t);o.stop(t+BL+.01);
    }
  }catch(e){}
}

function formatTimeAgo(ts) {
  if(!ts)return'0 min';
  let d=Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if(d<0)d=0;
  const m=Math.floor(d/60),h=Math.floor(m/60);
  if(h>0)return h+' Std '+ (m%60)+' min';
  return m+' min';
}

function getDeadlineInfo(order) {
  if (!order.deadline) return null;
  const [h,m] = order.deadline.split(':').map(Number);
  const dl = new Date(); dl.setHours(h,m,0,0);
  const diffMin = Math.floor((dl - Date.now()) / 60000);
  return { time: order.deadline, minsLeft: diffMin, isNear: diffMin <= 30 && diffMin > 0, isDue: diffMin <= 0 };
}

// Check deadlines and trigger alerts
function checkDeadlineAlerts() {
  Object.values(orders).forEach(order => {
    if (!order.deadline) return;
    const info = getDeadlineInfo(order);
    if (!info) return;

    // Alert exactly at 30 min before deadline (only once per order)
    if (info.minsLeft === 30 && !deadlineAlertsFired[order.id+'_30']) {
      deadlineAlertsFired[order.id+'_30'] = true;
      playAlertSound(5); // 5x loud beeps
    }
    // Alert at 15 min
    if (info.minsLeft === 15 && !deadlineAlertsFired[order.id+'_15']) {
      deadlineAlertsFired[order.id+'_15'] = true;
      playAlertSound(7); // 7x loud beeps
    }
    // Alert at 5 min
    if (info.minsLeft === 5 && !deadlineAlertsFired[order.id+'_5']) {
      deadlineAlertsFired[order.id+'_5'] = true;
      playAlertSound(10); // 10x loud beeps
    }
    // Alert when overdue
    if (info.minsLeft === 0 && !deadlineAlertsFired[order.id+'_0']) {
      deadlineAlertsFired[order.id+'_0'] = true;
      playAlertSound(10);
    }
  });
}

// Update timers + deadline bars + check alerts every second
setInterval(()=>{

    else if(dm<=15){el.className='deadline-banner near';el.textContent='🚨 NOCH '+mins+' MIN — Fertig bis '+ts;}
    else if(dm<=30){el.className='deadline-banner near';el.textContent='⏰ NOCH '+mins+' MIN — Fertig bis '+ts;}
    else {el.className='deadline-banner ok';el.textContent='✓ Fertig bis '+ts+' (in '+mins+' min)';}
  });
  checkDeadlineAlerts();
},1000);

// Map raw group keys (combo machine-keys OR product modifier names) to a clean label + css class.
function modGroupMeta(rawGroup) {
  var g = (rawGroup == null ? '' : String(rawGroup)).trim().toLowerCase();
  if (g === 'belag' || g === 'beläge' || g === 'belaege') return { label: '🍕 Belag', cls: 'g-belag' };
  if (g === 'special' || g === 'käserand' || g === 'kaeserand' || g === 'auf wunsch') return { label: '🧀 Wunsch', cls: 'g-special' };
  if (g === 'extras' || g === 'extra' || g === 'extrazutaten' || g === 'extra zutaten') return { label: '➕ Extra', cls: 'g-extra' };
  if (!g) return { label: '➕ Extra', cls: 'g-extra' };
  // Unknown but meaningful group name (regular product modifiers) -> show it as-is.
  return { label: '➕ ' + String(rawGroup).trim(), cls: 'g-extra' };
}

// Build the additions block for one item. Fully guarded: never emits a bare symbol,
// never emits "undefined", groups additions by category with clear labels.
function renderItemModifiers(item) {
  var mods = (item && item.modifiers) || [];
  if (!Array.isArray(mods) || mods.length === 0) return '';
  var groupsOrder = [];
  var groupsMap = {};
  for (var i = 0; i < mods.length; i++) {
    var m = mods[i];
    if (!m) continue;
    // Accept several shapes: {option}, {name}, or a plain string.
    var name;
    if (typeof m === 'string') name = m;
    else name = (m.option != null ? m.option : (m.name != null ? m.name : ''));
    name = String(name).trim();
    if (!name || name.toLowerCase() === 'undefined' || name.toLowerCase() === 'null') continue;
    var rawGroup = (typeof m === 'object' && m && m.group != null) ? m.group : 'Extra';
    var key = String(rawGroup).trim().toLowerCase() || 'extra';
    if (!groupsMap[key]) { groupsMap[key] = { meta: modGroupMeta(rawGroup), vals: [] }; groupsOrder.push(key); }
    groupsMap[key].vals.push(name);
  }
  if (groupsOrder.length === 0) return '';
  var html = '<div class="item-modifiers">';
  for (var j = 0; j < groupsOrder.length; j++) {
    var grp = groupsMap[groupsOrder[j]];
    html += '<div class="mod-group ' + grp.meta.cls + '"><span class="mod-label">' + grp.meta.label + '</span>'
      + grp.vals.map(function (n) { return '<span class="mod-val">' + n + '</span>'; }).join('')
      + '</div>';
  }
  html += '</div>';
  return html;
}

// Render the item <li> list. Items belonging to the same Angebot (combo) are
// preceded by one header showing the Angebot name, and visually grouped.
function renderItemsList(items) {
  if (!Array.isArray(items)) return '';
  var html = '';
  var lastCombo = null;
  items.forEach(function(item){
    if (!item) return;
    var cid = item.comboId || null;
    if (cid && cid !== lastCombo) {
      var cname = String(item.comboName || 'Angebot').trim() || 'Angebot';
      html += '<li class="combo-header">🌟 ' + cname + '</li>';
      lastCombo = cid;
    } else if (!cid) {
      lastCombo = null;
    }
    var modTxt = renderItemModifiers(item);
    var sizeName = item.size ? String(item.size.name||item.size.id||'').trim() : '';
    var notes = item.notes ? String(item.notes).trim() : '';
    var ingredients = getItemIngredients(item);
    html += '<li'+(cid?' class="combo-item"':'')+'><span class="item-qty">'+(item.quantity||1)+'x</span><div class="item-info">'
      + '<div class="item-name">'+(item.name||'?')+(item.productNumber?' <span class="item-product-num">#'+item.productNumber+'</span>':'')+'</div>'
      + (ingredients?'<div class="item-base"><span class="ib-icon">🧾</span><span>'+ingredients+'</span></div>':'')
      + (sizeName?'<div class="item-size">📏 '+sizeName+'</div>':'')
      + modTxt
      + (notes?'<div class="item-notes">📝 '+notes+'</div>':'')
      + '</div></li>';
  });
  return html;
}

function renderOrderCard(order) {
  const items=order.items||[],ts=order.createdAt;
  const age=getOrderAgeMinutes(order);
  let ageClass='';
  if(age>60)ageClass=' age-crit';
  else if(age>30)ageClass=' age-hot';
  else if(age>15)ageClass=' age-warn';

  let deadlineHtml='';
  if(order.deadline){
    const dl=getDeadlineInfo(order);
    if(dl){
      let cls='',txt='';
      if(dl.isDue){cls=' due';txt='⚠️ ÜBERFÄLLIG seit '+Math.abs(dl.minsLeft)+' min — SOFORT FERTIGSTELLEN! ('+dl.time+')';}
      else if(dl.minsLeft<=15){cls=' near';txt='🚨 NOCH '+dl.minsLeft+' MIN — Fertig bis '+dl.time;}
      else if(dl.minsLeft<=30){cls=' near';txt='⏰ NOCH '+dl.minsLeft+' MIN — Fertig bis '+dl.time;}
      else {cls=' ok';txt='✓ Fertig bis '+dl.time+' (in '+dl.minsLeft+' min)';}
      deadlineHtml='<div class="deadline-banner'+cls+'" data-deadline="'+order.deadline+'">'+txt+'</div>';
    }
  }

  const hasDeadlineClass = order.deadline ? ' has-deadline' : '';
  const readyClass = allStationsDone(order) ? ' all-ready' : '';
  const effIso = new Date(getEffectiveStart(order)).toISOString();
  const addr = order.address ? String(order.address).trim() : '';

  return '<div class="order-card status-'+order.status+hasDeadlineClass+readyClass+'" id="card-'+order.id+'">'
    +'<div class="card-header status-'+order.status+'">'
    +'<div><div class="order-number">'+order.orderNumber+'</div><div class="order-time">'+new Date(ts).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr</div></div>'
    +'<span class="status-badge">'+order.status+'</span>'
    +'</div>'
    +(addr?'<div class="card-address">📍 '+addr+'</div>':'')
    +renderStationProgress(order)
    +deadlineHtml
    +'<div class="card-body"><ul class="order-items-list">'
    +renderItemsList(items)
    +'</ul></div>'
    +'<div class="card-timer'+ageClass+'" data-timestamp="'+effIso+'">⏱ '+formatTimeAgo(effIso)+'</div>'
    +'<div class="card-actions">'
    +'<button class="btn-ready" onclick="markReady(\''+order.id+'\')" style="flex:1;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;background:#2ecc71;color:#000;text-transform:uppercase;letter-spacing:.5px">✓ جاهز</button>'
    +'</div>'
    +'</div>';
}

function renderAllOrders() {
  const grid=document.getElementById('ordersGrid');
  // Insgesamt/Teig: immer über ALLE aktiven Bestellungen (unabhängig vom Zeitfilter)
  renderInsgesamt(Object.values(orders));
  let list=Object.values(orders);
  if(timeFilter){list=list.filter(o=>getOrderAgeMinutes(o)>=timeFilter);}

  list.sort(function(a,b){return new Date(b.createdAt).getTime()-new Date(a.createdAt).getTime();});

  document.getElementById('countNew').textContent=list.length;

  if(list.length===0){
    var msg=timeFilter?'Keine Bestellungen > '+timeFilter+' min':'Keine aktiven Bestellungen';
    grid.innerHTML='<div class="empty-state"><div class="icon">🍳</div><h2>'+msg+'</h2><p>Neue Bestellungen erscheinen hier in Echtzeit</p></div>';
    return;
  }
  grid.innerHTML=list.map(renderOrderCard).join('');
}

function processOrdersData(ordersList) {
  var prevIds = new Set(Object.keys(orders));
  var newOrders={};
  var now=Date.now();
  ordersList.forEach(function(order){
    newOrders[order.id]=order;
    if(!firstSeenMap[order.id]) firstSeenMap[order.id]=now;   // Timer-Anker
    if(order.status==='NEW' && !prevIds.has(order.id)){
      playNotificationSound();
    }
  });
  Object.keys(firstSeenMap).forEach(function(id){ if(!newOrders[id]) delete firstSeenMap[id]; });
  knownOrderIds=new Set(Object.keys(newOrders));
  orders=newOrders;
  renderAllOrders();
}

function startFirebaseListener() {
  if (!db) return false;
  try {
    firebaseUnsubscribe = db.collection('orders')
      .where('status', '==', 'NEW')
      .onSnapshot(function(snapshot) {
        var ordersList = [];
        snapshot.forEach(function(doc) {
          var data = doc.data();
          ordersList.push({
            id: doc.id,
            orderNumber: data.orderNumber || '',
            status: data.status || 'NEW',
            items: data.items || [],
            deadline: data.deadline || null,
            address: data.address || null,
            stationsDone: data.stationsDone || [],
            createdAt: data.createdAt ? (data.createdAt.toDate ? data.createdAt.toDate().toISOString() : data.createdAt) : new Date().toISOString(),
            updatedAt: data.updatedAt ? (data.updatedAt.toDate ? data.updatedAt.toDate().toISOString() : data.updatedAt) : new Date().toISOString(),
            completedAt: null
          });
        });
        processOrdersData(ordersList);
      }, function(error) {
        console.error('Firestore listener error:', error);
        var statusEl = document.getElementById('firebaseStatus');
        if (statusEl) { statusEl.textContent = 'Error'; statusEl.style.background = '#e74c3c22'; statusEl.style.color = '#e74c3c'; statusEl.title = error.message; }
      });
    console.log('Firebase listener started - watching NEW orders');
    return true;
  } catch(e) {
    console.error('Failed to start Firebase listener:', e);
    return false;
  }
}

function unlockAudioNow() {
  if (audioUnlocked) return;
  try {
    var ctx = getAudioCtx();
    if (ctx.state === 'suspended') { ctx.resume(); }
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 800;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
    audioUnlocked = true;
    console.log('Audio unlocked, state:', ctx.state);
  } catch(e) { console.error('Audio unlock failed:', e); }
}
document.addEventListener('click', unlockAudioNow);
document.addEventListener('touchend', unlockAudioNow);
document.addEventListener('keydown', unlockAudioNow);
